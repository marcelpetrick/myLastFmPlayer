name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without a leading v, for example 0.0.61"
        required: true
        type: string
      publish_release:
        description: "Create the GitHub tag and release after the build passes"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      MY_LASTFM_PLAYER_REPORT_BROWSER: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libegl1 libpulse0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Validate release version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(python -c 'from my_lastfm_player.version import __version__; print(__version__)')"
          if [[ "${REQUESTED_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            printf 'Requested version %s does not match package version %s.\n' \
              "${REQUESTED_VERSION}" "${PACKAGE_VERSION}" >&2
            exit 1
          fi
          if [[ ! "${REQUESTED_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            printf 'Release version %s is not a valid SemVer-like value.\n' \
              "${REQUESTED_VERSION}" >&2
            exit 1
          fi
          TAG="v${REQUESTED_VERSION}"
          if [[ "${PUBLISH_RELEASE}" == "true" ]] \
            && git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            printf 'Tag %s already exists.\n' "${TAG}" >&2
            exit 1
          fi

      - name: Run local pipeline without GUI launch
        run: |
          set -o pipefail
          mkdir -p release-artifacts/raw
          ./localPipeline.sh --noRun --report-dir release-artifacts/raw \
            2>&1 | tee release-artifacts/raw/pipeline-console.log

      - name: Build zipped release artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python tools/build_release_artifacts.py \
            --report-dir release-artifacts/raw \
            --output-dir release-artifacts/assets \
            --version "${VERSION}" \
            --commit "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --generated-at "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p release-artifacts/publish
          cp dist/*.whl dist/*.tar.gz release-artifacts/assets/*.zip release-artifacts/publish/

      - name: Upload complete release asset set
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: release-artifacts/publish/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          PREFIX="my-lastfm-player-${VERSION}"
          DIST_PREFIX="my_lastfm_player-${VERSION}"
          flags=()
          if [[ "${DRAFT}" == "true" ]]; then
            flags+=(--draft)
          fi
          if [[ "${PRERELEASE}" == "true" ]]; then
            flags+=(--prerelease)
          fi
          printf 'Manual release for myLastFmPlayer %s.\n\n' "${TAG}" > release-notes.md
          cat >> release-notes.md <<'EOF'
          ## Release assets

          | Asset | Description |
          | --- | --- |
          | Wheel (.whl) | Directly installable Python package. |
          | Source distribution (.tar.gz) | Python source distribution. |
          | Packages ZIP | Wheel and source distribution in one archive. |
          | Sphinx documentation ZIP | Complete browsable HTML documentation; open index.html. |
          | C4 architecture ZIP | C4 source, rendered architecture page, and generated diagrams. |
          | Test results ZIP | Pytest console trace and JUnit XML. |
          | Coverage ZIP | Browsable HTML coverage and machine-readable coverage XML. |
          | Static analysis ZIP | Ruff and Pylint reports. |
          | Pipeline trace ZIP | Summary, build/check logs, import verification, and environment metadata. |

          Every ZIP contains a README.txt with its purpose and build provenance.
          EOF
          assets=(
            "release-assets/${DIST_PREFIX}-py3-none-any.whl#Installable Python wheel"
            "release-assets/${DIST_PREFIX}.tar.gz#Python source distribution"
            "release-assets/${PREFIX}-packages.zip#Wheel and source distribution"
            "release-assets/${PREFIX}-sphinx-docs.zip#Browsable Sphinx HTML documentation"
            "release-assets/${PREFIX}-c4-architecture.zip#C4 architecture source and rendered diagrams"
            "release-assets/${PREFIX}-test-results.zip#Pytest log and JUnit XML"
            "release-assets/${PREFIX}-coverage.zip#HTML and XML coverage reports"
            "release-assets/${PREFIX}-static-analysis.zip#Ruff and Pylint reports"
            "release-assets/${PREFIX}-pipeline-trace.zip#Complete pipeline trace and environment metadata"
          )
          gh release create "${TAG}" "${assets[@]}" \
            --target "${GITHUB_SHA}" \
            --title "myLastFmPlayer ${TAG}" \
            --notes-file release-notes.md \
            "${flags[@]}"
