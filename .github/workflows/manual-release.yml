name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without a leading v, for example 0.0.61"
        required: true
        type: string
      publish_release:
        description: "Create the GitHub tag and release after the build passes"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      MY_LASTFM_PLAYER_REPORT_BROWSER: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libegl1 libpulse0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Validate release version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(python -c 'from my_lastfm_player.version import __version__; print(__version__)')"
          if [[ "${REQUESTED_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            printf 'Requested version %s does not match package version %s.\n' \
              "${REQUESTED_VERSION}" "${PACKAGE_VERSION}" >&2
            exit 1
          fi
          if [[ ! "${REQUESTED_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            printf 'Release version %s is not a valid SemVer-like value.\n' \
              "${REQUESTED_VERSION}" >&2
            exit 1
          fi
          TAG="v${REQUESTED_VERSION}"
          if [[ "${PUBLISH_RELEASE}" == "true" ]] \
            && git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            printf 'Tag %s already exists.\n' "${TAG}" >&2
            exit 1
          fi

      - name: Run local pipeline without GUI launch
        run: ./localPipeline.sh --noRun

      - name: Upload release packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-packages
          path: dist/*
          if-no-files-found: error

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-reports
          path: |
            htmlcov
            docs/_build/html
          if-no-files-found: ignore

  publish:
    name: Publish GitHub Release
    needs: build
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Download release packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-packages
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          flags=()
          if [[ "${DRAFT}" == "true" ]]; then
            flags+=(--draft)
          fi
          if [[ "${PRERELEASE}" == "true" ]]; then
            flags+=(--prerelease)
          fi
          gh release create "${TAG}" dist/* \
            --target "${GITHUB_SHA}" \
            --title "myLastFmPlayer ${TAG}" \
            --notes "Manual release for myLastFmPlayer ${TAG}." \
            "${flags[@]}"
