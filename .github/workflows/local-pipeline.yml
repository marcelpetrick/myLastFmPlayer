name: Local Pipeline

on:
  push:
    branches:
      - main
      - master
      - "mpe/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-pipeline:
    name: Local pipeline replica
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      MY_LASTFM_PLAYER_REPORT_BROWSER: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libegl1 libpulse0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Run local pipeline without GUI launch
        run: ./localPipeline.sh --noRun

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-packages
          path: dist/*
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-html
          path: htmlcov
          if-no-files-found: ignore

      - name: Upload Sphinx documentation
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sphinx-html
          path: docs/_build/html
          if-no-files-found: ignore
