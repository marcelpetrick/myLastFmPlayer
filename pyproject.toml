[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "my-lastfm-player"
version = "0.1.0"
description = "Linux desktop app for fetching Last.fm loved tracks and preparing local playback."
readme = "readme.md"
requires-python = ">=3.11"
license = "GPL-3.0-or-later"
authors = [
    { name = "Marcel Petrick", email = "mail@marcelpetrick.it" }
]
dependencies = [
    "PyQt6>=6.7",
]

[project.optional-dependencies]
dev = [
    "build>=1.2",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.8",
]

[project.scripts]
my-lastfm-player = "my_lastfm_player.main:main"

[tool.setuptools.packages.find]
include = ["my_lastfm_player*"]

[tool.pytest.ini_options]
addopts = [
    "--strict-config",
    "--strict-markers",
    "--cov=my_lastfm_player",
    "--cov-report=term-missing",
    "--cov-fail-under=75",
]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["my_lastfm_player"]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
